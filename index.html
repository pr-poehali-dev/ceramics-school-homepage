      (function () {
        function isMobile() {
          return window.innerWidth <= 767;
        }
        function applyPosition(el) {
          if (!el || !el.style) return;
          var right = isMobile() ? '16px' : '24px';
          var bottom = isMobile() ? '104px' : '120px';
          if (
            el.style.getPropertyValue('right') === right &&
            el.style.getPropertyValue('left') === 'auto' &&
            el.style.getPropertyValue('bottom') === bottom
          ) {
            return;
          }
          el.style.setProperty('left', 'auto', 'important');
          el.style.setProperty('right', right, 'important');
          el.style.setProperty('bottom', bottom, 'important');
        }
        function scan() {
          var els = document.querySelectorAll(
            "jdiv.globalClass_ind, jdiv[class*='wrap_'], jdiv[class*='button_'], jdiv[id*='jivo']"
          );
          for (var i = 0; i < els.length; i++) applyPosition(els[i]);
        }
        var observer = new MutationObserver(scan);
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['style', 'class'],
        });
        window.addEventListener('resize', scan);
        scan();
      })();
